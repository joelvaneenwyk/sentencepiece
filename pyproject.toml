[project]
name = "sentencepiece"
dynamic = ["version", "classifiers"]
description = "SentencePiece python wrapper"
authors = [
    { name = "Taku Kudo", email = "taku@google.com" }
]
requires-python = ">=3.10"
dependencies = []
readme = "python/README.md"
license = { file = "LICENSE" }

[project.scripts]
python = "sentencepiece:main"

[build-system]
requires = ["setuptools", "wheel", "cmake", "ninja"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["python/src/"]

[tool.uv]
managed = true
package = true

[dependency-groups]
dev = [
    "build",
    "cmake",
    "ninja",
    "pytest>=8.3.4",
    "ruff",
    "setuptools",
    "wheel",
]

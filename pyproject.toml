[project]
name = "sentencepiece"
dynamic = ["version"]
description = "SentencePiece python wrapper"
authors = [{ name = "Taku Kudo", email = "taku@google.com" }]
requires-python = ">=3.9"
dependencies = []
readme = "python/README.md"
license = { file = "LICENSE" }

classifiers = [
    'Development Status :: 5 - Production/Stable',
    'Environment :: Console',
    'Intended Audience :: Developers',
    'Intended Audience :: Science/Research',
    'License :: OSI Approved :: Apache Software License',
    'Operating System :: Unix',
    'Programming Language :: Python',
    'Topic :: Text Processing :: Linguistic',
    'Topic :: Software Development :: Libraries :: Python Modules',
]

[project.urls]
homepage = "https://github.com/google/sentencepiece"

[build-system]
requires = ["py-build-cmake", "swig", "cmake", "ninja", "build", "uv"]
build-backend = "py_build_cmake.build"

[tool.py-build-cmake.module]
name = "sentencepiece"   # Import name
directory = "python/src"

[tool.py-build-cmake.sdist]
include = [
    "MANIFEST.in",
    "pyproject.toml",
    "LICENSE",
    "VERSION.txt",
    "README.md",
    "sentencepiece.pc.in",
    "config.h.in",
    "build_*.sh",
    "CMakeLists.txt",
    "cmake/*",
    "src/",
    "python/",
    "third_party/",
]
exclude = ["build/", "python/build/", "python/src/sentencepiece/*.pyd"]

[tool.py-build-cmake.cmake]
minimum_version = "3.18"
build_type = "Release"
source_path = "."                       # Containing CMakeLists.txt
args = ["-Wdev"]
build_path = "build/setup-py"
build_args = ["-j"]
build_tool_args = []
install_args = ["--verbose"]
install_components = ["python_modules"]

[tool.py-build-cmake.cmake.options]
SPM_ENABLE_SHARED = "OFF"
SPM_ENABLE_TENSORFLOW_SHARED = "ON"
CMAKE_INSTALL_PREFIX = "build/root"

[tool.py-build-cmake.cmake.env]

[tool.py-build-cmake.linux.cmake] # Linux-specific options
generator = "Ninja"

[tool.py-build-cmake.mac.cmake] # macOS-specific options
generator = "Ninja"

[tool.py-build-cmake.windows.cmake] # Windows-specific options
generator = "Visual Studio 17 2022"

[tool.py-build-cmake.wheel]
python_abi = 'abi3'
abi3_minimum_cpython_version = 38 # Should match Py_LIMITED_API

[tool.py-build-cmake.editable]
mode = "symlink"
build_hook = true

[tool.cibuildwheel]
build-verbosity = 1
environment = { PY_BUILD_CMAKE_VERBOSE="1" }

[tool.uv]
managed = true
package = true
link-mode = "copy"

[tool.pytest.ini_options]
addopts = [
    "-v",
    "-s",
    "--doctest-modules",
    "--cov=sentencepiece",
    "--cov-report=term-missing",
]
testpaths = ["python/test"]

[dependency-groups]
dev = [
    "build>=1.2.2.post1",
    "cmake>=3.31.4",
    "coverage>=7.6.12",
    "ipykernel>=6.29.5",
    "ipywidgets>=8.1.5",
    "mypy>=1.15.0",
    "ninja>=1.11.1.3",
    "pip>=25.0.1",
    "pytest>=8.3.4",
    "pytest-cov>=6.0.0",
    "ruff>=0.9.6",
    "setuptools>=75.8.0",
    "tox>=4.24.1",
    "tox-uv>=1.25.0",
    "types-protobuf>=5.29.1.20250208",
    "types-setuptools>=75.8.0.20250210",
    "wheel>=0.45.1",
]

[tool.tox]
requires = ["tox>=4.19"]
env_list = ["3.13", "3.12", "3.11", "3.10", "3.9", "type"]
allowlist_externals = ["pytest", "mypy"]
isolated_build = true

[tool.tox.env_run_base]
runner = "uv-venv-lock-runner"
description = "Run test under {base_python}"
commands = [["pytest"]]

[tool.tox.env.type]
runner = "uv-venv-lock-runner"
description = "Run type check on code base"
commands = [["mypy", "python{/}src"], ["mypy", "python{/}test"]]

[project]
name = "sentencepiece"
dynamic = ["version"]
description = "SentencePiece python wrapper"
authors = [
    { name = "Taku Kudo", email = "taku@google.com" }
]
requires-python = ">=3.9"
dependencies = []
readme = "python/README.md"
license = { file = "LICENSE" }

classifiers=[
    'Development Status :: 5 - Production/Stable',
    'Environment :: Console',
    'Intended Audience :: Developers',
    'Intended Audience :: Science/Research',
    'License :: OSI Approved :: Apache Software License',
    'Operating System :: Unix',
    'Programming Language :: Python',
    'Topic :: Text Processing :: Linguistic',
    'Topic :: Software Development :: Libraries :: Python Modules',
]

[project.urls]
homepage = "https://github.com/google/sentencepiece"

[build-system]
requires = ["setuptools>=61", "wheel", "build", "cmake", "ninja"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["python/src/"]
include = ["python/src/sentencepiece"]

[tool.uv]
managed = true
package = true
link-mode = "copy"

[tool.pytest.ini_options]
addopts = ["-v", "-s", "--doctest-modules", "--cov=sentencepiece", "--cov-report=term-missing"]
testpaths = ["python/test"]

[dependency-groups]
dev = [
    "build>=1.2.2.post1",
    "cmake>=3.31.4",
    "coverage>=7.6.12",
    "ipykernel>=6.29.5",
    "ipywidgets>=8.1.5",
    "ninja>=1.11.1.3",
    "pip>=25.0.1",
    "pytest>=8.3.4",
    "pytest-cov>=6.0.0",
    "ruff>=0.9.6",
    "setuptools>=75.8.0",
    "tox>=4.24.1",
    "wheel>=0.45.1",
]

[tool.tox]
requires = ["tox>=4.19"]
env_list = ["3.13", "3.12", "type"]
allowlist_externals = ["pytest", "mypy"]

[tool.tox.env_run_base]
description = "Run test under {base_python}"
commands = [["pytest"]]

[tool.tox.env.type]
description = "run type check on code base"
deps = ["mypy==1.11.2", "types-cachetools>=5.5.0.20240820", "types-chardet>=5.0.4.6"]
commands = [["mypy", "src{/}tox"], ["mypy", "tests"]]

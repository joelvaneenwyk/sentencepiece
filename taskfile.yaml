# yaml-language-server: $schema=https://taskfile.dev/schema.json
# cspell:ignore taskfile,vcpkg,msbuild,makefiles,deinit

version: '3'

vars:
  DEFAULT_CONFIG: Release
  DEFAULT_PLATFORM: x64
  DEFAULT_SOLUTION: sentencepiece.sln
  PLATFORMS: [Win32, x64]
  CONFIGURATIONS:
    - Debug
    - Release
  BUILD_DIR: build/task
  INSTALL_DIR: build/task_install


tasks:
  default:
    desc: Build and run tests
    cmds:
      - task: test

  build:
    deps: [python]
    desc: Build Python extension
    vars:
      PACKAGE_VERSION:
        sh: | # shell
          uv run --no-sync python -c "exec(open('python/src/sentencepiece/_version.py').read()); print(__version__)"
    sources:
      - pyproject.toml
    generates:
      - dist/sentencepiece-{{.PACKAGE_VERSION}}*.whl
      - dist/sentencepiece-{{.PACKAGE_VERSION}}.tar.gz
    silent: false
    cmds:
      - cmd: |
          uv build -v

  buildext:
    deps: [requirements]
    aliases: [build-python-extension, pyd, pyext, build-ext, py-ext]
    sources:
      - python/**/*.cxx
      - python/**/*.i
      - src/*.cc
      - src/*.h
      - src/*.proto
    generates:
      - python/src/sentencepiece/_sentencepiece*.pyd
    silent: false
    cmds:
      - cmd: |
          uv pip install \
            --require-hashes --no-deps -r .github/workflows/requirements/base.txt
      - cmd: |
          uv run --no-sync python \
            ./setup.py build_ext \
            --inplace \
            {{.CLI_VERBOSE | ternary "--verbose" ""}}

  test:
    deps: [buildext]
    silent: false
    cmds:
      # Direct call to make sure that works
      - cmd: |
          uv run python ./python/test/sentencepiece_test.py
      # Call through 'pytest' which should also work
      - cmd: |
          uv run --no-sync python -m pytest

  bdist_wheel:
    aliases: [bdist, wheel, w]
    deps: [buildext]
    cmds:
      - cmd: |
          uv run --no-sync python -m build --wheel

  ci:
    desc: Run exhaustive series of tests
    cmds:
      - cmd: git add .
      - cmd: git clean -xfd
      - task: tox
      - task: wheelhouse
      - task: build
      - task: build-python-extension

  sync:
    desc: Sync Python dependencies
    aliases: [s]
    sources:
      - pyproject.toml
    generates:
      - .venv/pyvenv.cfg
    silent: true
    cmds:
      - cmd: uv venv --allow-existing
      - cmd: |
          if {{.CLI_FORCE}}; then
            rm -f uv.lock
          fi
      - cmd: |
          uv sync \
            --python-preference only-managed \
            --no-install-project \
            {{.CLI_VERBOSE | ternary "--verbose" "--quiet"}}
      - cmd: echo "Python dependencies synced."

  python:
    desc: Install Python dependencies
    aliases: [py]
    deps:
      - for: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        task: python:install
        vars: { VERSION: '{{ .ITEM }}' }
    cmds:
      - cmd: |
          if dpkg-query -W -f='${Status}' python3-dev 2>/dev/null | grep -q "install ok installed"; then
            echo "python3-dev is installed."
          else
            sudo apt-get install -y --no-install-recommends \
              python3-dev
          fi
        platforms: [linux]

  python:install:
    internal: true
    requires:
      vars: [VERSION]
    desc: Install Python {{.VERSION}}
    cmds:
      - cmd: |
          if pyenv --version >/dev/null 2>&1; then
            pyenv install --skip-existing {{.VERSION}}
          else
            echo "Skipped Python {{.VERSION}} install. 'pyenv' not available."
          fi

  docker:
    aliases: [d]
    status:
      - docker --version
    cmds:
      - cmd: |
          # Add Docker's official GPG key:
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            ca-certificates curl
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc

          # Add the repository to Apt sources:
          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu \
            $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}") stable" | \
            sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

          sudo apt-get update
      - cmd: |
          sudo apt-get install --yes --no-install-recommends \
            docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
      - cmd: |
          sudo docker run hello-world

  cibuildwheel:
    desc: Build wheels using `cibuildwheel`
    aliases: [wheelhouse, wheels, wh, cibw]
    deps: [docker, sync, python]
    cmds:
      - cmd: |
          uvx --from git+https://github.com/pypa/cibuildwheel --python-preference only-managed \
            cibuildwheel --output-dir wheelhouse

  tox:
    desc: Run tox tests
    cmds:
      - cmd: |
          uvx --from "tox" --with "pip" --with "tox-uv" --python 3.12 --python-preference only-managed \
            tox -p

  cmake:
    desc: CMake build, test, and pack
    aliases: [c, make]
    cmds:
      - task: cmake:build
      - task: cmake:test
      - task: cmake:pack

  cmake:configure:
    internal: true
    sources:
      - src/*.cc
      - src/*.h
      - src/*.proto
    generates:
      - build/setup*/CMakeCache.txt
    cmds:
      - cmd: |
          cmake -B "{{.BUILD_DIR}}" \
          -DSPM_BUILD_TEST=ON \
          -DSPM_ENABLE_SHARED=OFF \
          -DCMAKE_INSTALL_PREFIX="{{.INSTALL_DIR}}"

  cmake:build:
    internal: true
    deps: [cmake:configure]
    sources:
      - '**/*.cpp'
      - '**/*.h'
    generates:
      - '{{.BUILD_DIR}}/bin/sentencepiece{{exeExt}}'
    cmds:
      - cmd: |
          cmake --build "{{.BUILD_DIR}}" \
            --config Release \
            --parallel
      - cmd: |
          cd "{{.BUILD_DIR}}"
          ctest -C Release --output-on-failure
      - cmd: |
          cd "{{.BUILD_DIR}}"
          cpack

  cmake:test:
    internal: true
    cmds:
      - cmd: |
          cd "{{.BUILD_DIR}}"
          ctest -C Release --output-on-failure
      - cmd: |
          cd "{{.BUILD_DIR}}"
          cpack

  cmake:pack:
    cmds:
      - cmd: |
          cd "{{.BUILD_DIR}}"
          cpack

  requirements:
    desc: Generate requirements files
    aliases: [r, pc]
    cmds:
      - task: pip-compile
        vars: { INPUT: base.in }
      - task: pip-compile
        vars: { INPUT: cibuildwheel.in }

  pip-compile:
    internal: true
    requires:
      vars: [INPUT]
    vars:
      RQ_IN: '{{ .INPUT }}'
      RQ_OUT: '{{ .INPUT | replace ".in" ".txt" }}'
      RQ_DIR: .github/workflows/requirements
    env:
      RQ_IN_PATH: '{{ joinPath .RQ_DIR .RQ_IN | toSlash }}'
      RQ_OUT_PATH: '{{ joinPath .RQ_DIR .RQ_OUT | toSlash }}'
    label: pip-compile {{ .RQ_IN }} > {{ .RQ_OUT }}
    desc: Compile {{ .RQ_IN }} to {{ .RQ_OUT }}
    silent: true
    sources:
      - .github/workflows/requirements/{{.RQ_IN}}
    generates:
      - .github/workflows/requirements/{{.RQ_OUT}}
    cmds:
      # We use 'pip<23' so that output has relative paths. See:
      #   https://github.com/jazzband/pip-tools/issues/2131
      - cmd: | # shell
          uvx --from "pip-tools" --with "pip<23" --python 3.9 --python-preference only-managed \
            pip-compile \
            --config pyproject.toml \
            --output-file $RQ_OUT_PATH \
            $RQ_IN_PATH

  ci-wheels:
    deps: [sync]
    cmds:
      - cmd: |
          uv run --no-sync python -m cibuildwheel \
            --output-dir wheelhouse

  ci-build:
    cmds:
      - cmd: |
          cmake -S . -G "Visual Studio 17 2022" -A Win32 -B "./build_win32" \
            -DSPM_ENABLE_SHARED=OFF \
            -DCMAKE_INSTALL_PREFIX=./build/root_win32
      - cmd: |
          cmake --build "./build_win32" \
            --config Release --target install --parallel 8
      - cmd: |
          cmake -G "Visual Studio 17 2022" -A x64   -B ./build_amd64 \
            -DSPM_ENABLE_SHARED=OFF \
            -DCMAKE_INSTALL_PREFIX=./build/root_amd64
      - cmd: |
          cmake --build ./build_amd64 \
            --config Release --target install --parallel 8
      - cmd: |
          cmake -G "Visual Studio 17 2022" -A arm64 -B ./build_arm64 \
            -DSPM_ENABLE_SHARED=OFF \
            -DCMAKE_INSTALL_PREFIX=./build/root_arm64
      - cmd: |
          cmake --build ./build_arm64 \
            --config Release --target install --parallel 8

  run:
    deps: [build]
    cmds:
      - cmd: '{{.BUILD_DIR}}/bin/sentencepiece{{exeExt}}'

  build-all-configurations:
    aliases: [all, check, lint, ci]
    silent: true
    cmds:
      - for: { var: CONFIGURATIONS }
        task: build-all-platforms
        vars: { CONFIG: '{{ .ITEM }}' }

  build-all-platforms:
    silent: true
    cmds:
      - for: { var: PLATFORMS }
        task: msbuild
        vars: { PLATFORM: '{{ .ITEM }}', CONFIG: '{{ .CONFIG }}' }

  msbuild:
    silent: true
    vars:
      MSBUILD:
        sh: | # shell
          strings=("Preview" "Enterprise" "Professional" "Community")
          for str in "${strings[@]}"
          do
            result="C:/Program Files/Microsoft Visual Studio/2022/${str}/MSBuild/Current/Bin/amd64/MSBuild.exe"
            if [ -e "$result" ]; then
              echo "$result"
              break
            fi
          done
      MSBUILD_CONFIG: '{{ .CONFIG | default .DEFAULT_CONFIG }}'
      MSBUILD_SOLUTION: '{{ joinPath .TASKFILE_DIR (.SOLUTION | default .DEFAULT_SOLUTION) }}'
      MSBUILD_PLATFORM: '{{ .PLATFORM | default .DEFAULT_PLATFORM }}'
    cmds:
      - cmd: echo "Building '{{ .MSBUILD_SOLUTION }}' with '{{ .MSBUILD_CONFIG }}' configuration."
      - cmd: >-
          "{{fromSlash .MSBUILD}}"
          /m
          /t:Build
          /p:Configuration="{{.MSBUILD_CONFIG}}"
          /p:Platform="{{.MSBUILD_PLATFORM}}"
          "{{fromSlash .MSBUILD_SOLUTION}}"

  pre-commit:
    cmds:
      - git add --renormalize .
      - git reset --mixed
      - task revert-whitespace

  revert-whitespace:
    cmds:
      - cmd: git diff -U0 -w --no-color | git apply --cached --ignore-whitespace --unidiff-zero -
